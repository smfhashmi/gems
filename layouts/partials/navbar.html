<header
  id="site-header"
  class="site-header fixed left-4 right-4 top-4 z-50 mx-auto flex max-w-container-max items-center justify-between gap-4 rounded-full border border-white/20 bg-white/80 px-4 py-3 shadow-nav backdrop-blur-xl md:left-6 md:right-6 md:px-6"
>
  <a href="{{ "/" | relURL }}" class="flex min-w-0 shrink-0 items-center gap-3 transition hover:opacity-90">
    <img
      src="{{ (.Site.Params.logo | default "/images/logo.jpg") | relURL }}"
      alt="{{ .Site.Params.schoolName }}"
      class="h-12 w-auto max-h-14 max-w-[180px] object-contain md:h-14 md:max-w-[220px]"
      width="220"
      height="56"
    />
  </a>

  <nav class="hidden items-center gap-6 lg:gap-8 md:flex">
    {{ $current := .RelPermalink }}
    {{ range .Site.Menus.main }}
      <a
        href="{{ .URL }}"
        class="whitespace-nowrap font-label-caps text-label-caps transition-colors{{ if eq $current .URL }} border-b-2 border-secondary font-bold text-secondary{{ else }} text-on-surface-variant hover:text-primary{{ end }}"
      >
        {{ .Name }}
      </a>
    {{ end }}
  </nav>

  <div class="flex shrink-0 items-center gap-2 md:gap-3">
    <a href="{{ "/contact/" | relURL }}" class="hidden rounded-full bg-primary px-5 py-2 font-sans text-button text-on-primary transition hover:scale-105 sm:inline-flex md:px-6 md:py-2.5">
      Enquire Now
    </a>

    <details class="relative md:hidden">
      <summary class="cursor-pointer list-none rounded-full border border-outline-variant/30 bg-surface-container-low px-4 py-2 font-sans text-button text-primary">
        Menu
      </summary>
      <div class="absolute right-0 z-[60] mt-3 w-52 overflow-hidden rounded-2xl border border-outline-variant/20 bg-white p-2 shadow-bento">
        {{ $current := .RelPermalink }}
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}" class="block rounded-xl px-4 py-3 text-sm font-semibold text-on-surface-variant hover:bg-surface-container-low{{ if eq $current .URL }} bg-surface-container-low text-primary{{ end }}">{{ .Name }}</a>
        {{ end }}
        <a href="{{ "/contact/" | relURL }}" class="mt-1 block rounded-xl bg-primary px-4 py-3 text-center text-sm font-semibold text-on-primary">Enquire Now</a>
      </div>
    </details>
  </div>
</header>

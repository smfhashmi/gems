{{ define "main" }}
  <section class="bg-surface-container pt-32 pb-12">
    <div class="mx-auto max-w-container-max px-margin-mobile md:px-margin-desktop">
      <p class="section-label">Archive</p>
      <h1 class="font-display-lg text-display-lg-mobile text-primary md:text-display-lg">{{ .Title }}</h1>
      {{ with .Content }}
        <div class="prose-school mt-6 max-w-3xl">{{ . }}</div>
      {{ end }}
    </div>
  </section>

  {{ if .RegularPages }}
    <section class="mx-auto max-w-container-max px-margin-mobile py-16 md:px-margin-desktop">
      <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
        {{ range .RegularPages.ByDate.Reverse }}
          <article class="blog-card">
            <p class="font-label-caps text-label-caps text-on-surface-variant">{{ .Date.Format "02 Jan 2006" }}</p>
            <h2 class="mt-4 font-headline-sm text-headline-sm text-primary">{{ .Title }}</h2>
            <p class="mt-3 text-sm leading-7 text-on-surface-variant">{{ .Summary }}</p>
            <a href="{{ .RelPermalink }}" class="mt-6 inline-flex items-center gap-2 font-label-caps text-label-caps text-secondary">
              Open article
              <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </a>
          </article>
        {{ end }}
      </div>
    </section>
  {{ end }}
{{ end }}

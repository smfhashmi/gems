{{ define "main" }}
  <section class="mx-auto w-full max-w-7xl px-4 py-10 sm:px-6 lg:px-8 lg:py-16">
    <div class="content-panel">
      <p class="section-label">{{ .Title }}</p>
      <h1 class="mt-5 text-5xl">{{ .Title }}</h1>
      {{ with .Content }}<div class="mt-6 max-w-3xl text-slate-300">{{ . }}</div>{{ end }}
    </div>

    {{ if .RegularPages }}
      <div class="mt-10 grid gap-6 md:grid-cols-2 xl:grid-cols-3">
        {{ range .RegularPages.ByDate.Reverse }}
          <article class="blog-card">
            <p class="text-xs uppercase tracking-[0.3em] text-slate-400">{{ .Date.Format "02 Jan 2006" }}</p>
            <h2 class="mt-4 text-2xl">{{ .Title }}</h2>
            <p class="mt-3 text-sm leading-7 text-slate-300">{{ .Summary }}</p>
            <a href="{{ .RelPermalink }}" class="mt-6 inline-flex text-sm font-bold text-brand-200 hover:text-brand-100">Open article</a>
          </article>
        {{ end }}
      </div>
    {{ end }}
  </section>
{{ end }}

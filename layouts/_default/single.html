{{ define "main" }}
  <article class="mx-auto w-full max-w-5xl px-4 py-10 sm:px-6 lg:px-8 lg:py-16">
    <div class="content-panel">
      <p class="section-label">{{ .Section | title }}</p>
      <h1 class="mt-5 text-5xl">{{ .Title }}</h1>
      {{ with .Params.description }}<p class="mt-5 max-w-3xl text-lg leading-8 text-slate-300">{{ . }}</p>{{ end }}
      <div class="mt-8 max-w-none space-y-6 text-slate-300 [&>h2]:font-serif [&>h2]:text-3xl [&>h3]:font-serif [&>h3]:text-2xl [&>ul]:list-disc [&>ul]:pl-6 [&>ol]:list-decimal [&>ol]:pl-6 [&_a]:font-semibold [&_a]:text-brand-200 [&_a:hover]:text-brand-100">
        {{ .Content }}
      </div>
    </div>
  </article>
{{ end }}

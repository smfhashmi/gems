{{ define "main" }}
  <section class="bg-surface-container pt-32 pb-12">
    <div class="mx-auto max-w-container-max px-margin-mobile md:px-margin-desktop">
      <p class="section-label">{{ .Section | title }}</p>
      <h1 class="font-display-lg text-display-lg-mobile text-primary md:text-display-lg">{{ .Title }}</h1>
      {{ with .Params.description }}
        <p class="mt-5 max-w-3xl font-body-lg text-body-lg text-on-surface-variant">{{ . }}</p>
      {{ end }}
    </div>
  </section>

  <article class="mx-auto max-w-container-max px-margin-mobile py-16 md:px-margin-desktop">
    <div class="content-panel prose-school">
      {{ .Content }}
    </div>
  </article>
{{ end }}

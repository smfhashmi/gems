quote = 'Education at Deccan Gems is not just about the curriculum; it is about the whole child. We nurture thinkers, dreamers, and doers who will grow with confidence and care.'
bio = 'Our mission is to provide an environment where every student feels seen, heard, and challenged. We focus on empathy, adaptability, and strong foundations alongside academic mastery.'

